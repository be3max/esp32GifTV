name: Build and Release Firmware

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Inject auto-version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          sed -i "s/-DFIRMWARE_VERSION_STR=\\\\\"[^\\\\\"]*\\\\\"/-DFIRMWARE_VERSION_STR=\\\\\"${VERSION}\\\\\"/" platformio.ini
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Injected version: ${VERSION}"
          grep FIRMWARE_VERSION_STR platformio.ini

      - name: Build firmware
        run: pio run -e tv-miner-esp32

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "Firmware v${{ env.VERSION }}"
          body: |
            ## ESP32 GIF TV Firmware v${{ env.VERSION }}

            Built from commit ${{ github.sha }} on `main`.

            Flash via OTA (automatic within 15 min) or manually:
            ```
            pio run -e tv-miner-esp32 -t upload
            ```
          files: .pio/build/tv-miner-esp32/firmware.bin
          fail_on_unmatched_files: true
