[env:tv-miner-esp32]
platform = espressif32
board = esp32dev
framework = arduino

; Serial
monitor_speed  = 115200
monitor_port   = COM7
upload_port    = COM7
upload_speed   = 921600

; Custom partitions + LittleFS
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43
  bitbank2/AnimatedGIF @ ^2.1.0
  bblanchon/ArduinoJson @ ^7.0.4
  mathieucarbou/ESPAsyncWebServer @ ^3.3.0
  mathieucarbou/AsyncTCP @ ^3.3.0
  tzapu/WiFiManager @ ^2.0.17
  arduino-libraries/NTPClient @ ^3.2.1
  ricmoo/QRCode @ ^0.0.1

; --- TFT_eSPI: ST7789 240×240, NM-TV-154 (NMMiner TV-Miner v1.0) pin mapping ---
; Source: https://www.nmminer.com/2026/03/02/how-to-develop-nm-tv-custom-firmware/
build_flags =
  -DUSER_SETUP_LOADED=1
  -DST7789_DRIVER=1
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=240
  -DTFT_MISO=-1
  -DTFT_MOSI=13
  -DTFT_SCLK=14
  -DTFT_CS=15
  -DTFT_DC=2
  -DTFT_RST=-1              ; RST not connected
  -DTFT_BL=19
  -DTFT_BACKLIGHT_ON=LOW    ; active LOW backlight
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1
  -DLOAD_FONT7=1            ; 7-segment 48px digits — retro clock display
  -DLOAD_GFXFF=1
  -DSMOOTH_FONT=1
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=20000000
  -DFIRMWARE_VERSION_STR=\"1.0.0\"
